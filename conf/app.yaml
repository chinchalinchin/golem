# ------------------------------------------------------ CONFIGURATION
app:
  name: "Golem"
  version: "0.16.0"
  log_level: "INFO"
config:
  simple: 'conf/simple.cfg'
  basic: 'conf/basic.cfg'
  classic: 'conf/classic.cfg'
  fluid: 'conf/fluid.cfg'
data:
  prefix: "golem_"
  dirs:
    training: "data/training/"
    model: "data/model/"
# ------------------------------------------------------ BRAIN
brain:
  mode: "simple"
  sensors:
    visual: true
    depth: true
    audio: false
    thermal: true
  cortical_depth: 3
  working_memory: 128
  dsp:
    sample_rate: 44100
    n_fft: 1024
    hop_length: 256
    n_mels: 64
# ------------------------------------------------------ LOSS
loss:
  focal:
    alpha: 0.25
    gamma: 1.5
  asymmetric:
    gamma_pos: 1.0
    gamma_neg: 4.0
    clip: 0.05
  smooth: 
    epsilon: 0.1
# ------------------------------------------------------ TRAINING 
training:
  batch_size: 16
  learning_rate: 0.0001
  epochs: 150
  sequence_length: 32
  loss: "smooth"
  augmentation:
    mirror: true
# ------------------------------------------------------ RANDOMIZER
randomizer:
  executable: "/Users/gmoore/Home/lib/oblige/Oblige"
  output: "data/wads/"                   
# ------------------------------------------------------ MODULES
modules:
  # --- Original ViZDoom Defaults ---
  basic:
    scenario: "basic.wad"
    map: "map01"
    episodes: 10
  navigation:
    scenario: "my_way_home.wad" 
    map: "map01"
    episodes: 10
  combat:
    scenario: "deadly_corridor.wad"
    map: "map01"
    episodes: 10
  center:
    scenario: "defend_the_center.wad"
    map: "map01"
    episodes: 1
  defend:
    scenario: "defend_the_line.wad"
    map: "map01"
    episodes: 1
  prediction:
    scenario: "predict_position.wad"
    map: "map01"
    episodes: 1
  deathmatch:
    scenario: "deathmatch.wad"
    map: "map01"
    episodes: 1
  cover:
    scenario: "take_cover.wad"
    map: "map01"
    episodes: 5
  # --- External / Community RL WADs ---
  arena:
    scenario: "/Users/gmoore/Home/games/doom/wads/cig2017.wad" 
    map: "map01"
    episodes: 1
  freedoom:
    scenario: "/Users/gmoore/Home/games/doom/wads/freedoom1.wad"
    map: "map02"
    episodes: 1
  freedoom2:
    scenario: "/Users/gmoore/Home/games/doom/wads/freedoom2.wad"
    map: "map01"
    episodes: 1
  demonfear:
    scenario: "/Users/gmoore/Home/games/doom/wads/demonfear.wad"
    map: "map01"
    episodes: 1
  # --- Retail IWADs ---
  doom:
    scenario: "/Users/gmoore/Home/games/doom/wads/doom.wad"
    map: "E1M2"
    episodes: 1
  doom2:
    scenario: "/Users/gmoore/Home/games/doom/wads/doom2.wad"
    map: "map01"
    episodes: 1
  plutonia:
    scenario: "/Users/gmoore/Home/games/doom/wads/plutonia.wad"
    map: "map01"
    episodes: 1
  tnt:
    scenario: "/Users/gmoore/Home/games/doom/wads/tnt.wad"
    map: "map01"
    episodes: 1
# ------------------------------------------------------ KEYBINDINGS 
keybindings:
  simple:
    w: "+forward"
    s: "+back"
    a: "+moveleft"
    d: "+moveright"
    leftarrow: "+left"
    rightarrow: "+right"
    space: "+attack"
  basic:
    w: "+forward"
    s: "+back"
    a: "+moveleft"
    d: "+moveright"
    leftarrow: "+left"
    rightarrow: "+right"
    e: "+use"
    space: "+attack"
  classic: 
    w: "+forward"
    s: "+back"
    a: "+moveleft"
    d: "+moveright"
    leftarrow: "+left"
    rightarrow: "+right"
    e: "+use"
    space: "+attack"
    "1": '"slot 2"'
    "2": '"slot 3"'
  fluid:
    w: "+forward"
    s: "+back"
    a: "+moveleft"
    d: "+moveright"
    leftarrow: "+left"
    rightarrow: "+right"
    e: "+use"
    space: "+attack"
    q: "weapnext"