site_name: Golem
site_url: https://chinchalinchin.github.io/golem/
repo_url: https://github.com/chinchalinchin/golem
repo_name: chinchalinchin/golem

theme:
  name: material
  palette: 
    scheme: slate
    primary: red
    accent: deep orange
  features:
    - content.code.copy
    - navigation.expand
    - navigation.indexes

nav:
  - Home: index.md
  - Configuration: configuration.md
  - Environment: environment.md
  - The Brain: brain.md
  - Training: training.md
  - Philosophy: philsophy.md
  - Roadmap: roadmap.md
  - Issues: issues.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true 
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

plugins:
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google