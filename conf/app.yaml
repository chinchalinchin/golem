app:
  name: "Golem"
  version: "0.2.2"
  log_level: "INFO"

training:
  batch_size: 16
  learning_rate: 0.0001
  epochs: 10
  model_save_path: "data/golem_brain.pth"
  sequence_length: 32
  action_space_size: 8
  # NEW: Data Augmentation Settings
  augmentation:
    mirror: true 

data:
  output_dir: "data"
  filename_prefix: "doom_training"

modules:
  basic:
    scenario: "basic.wad"
    config: "conf/common.cfg"
    episodes: 5
  
  navigation:
    scenario: "my_way_home.wad" 
    config: "conf/common.cfg"
    episodes: 15
    
  combat:
    scenario: "deadly_corridor.wad"
    config: "conf/common.cfg"
    episodes: 15

  doomsday:
    scenario: "/Users/gmoore/Home/games/doom/wads/DOOM2.WAD"
    config: "conf/common.cfg"
    episodes: 5