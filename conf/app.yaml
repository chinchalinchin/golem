app:
  name: "Golem"
  version: "0.2.3"
  log_level: "INFO"

config:
  basic: 'conf/basic.cfg'
  classic: 'conf/classic.cfg'
  fluid: 'conf/fluid.cfg'

training:
  batch_size: 16
  learning_rate: 0.0001
  epochs: 10
  sequence_length: 32
  augmentation:
    mirror: true

  # DEPRECATING
  model_save_path: "data/golem_brain.pth"
  config: "basic"

brain:
  # MODES: basic, classic, fluid
  mode: "fluid"
  cortical_depth: 3
  working_memory: 128

data:
  prefix: "golem_"
  dirs:
    training: "data/"
    model: "data/model/"

  # DEPRECATING
  output_dir: "data"
  filename_prefix: "doom_training"

modules:
  basic:
    scenario: "basic.wad"
    episodes: 10
  navigation:
    scenario: "my_way_home.wad" 
    episodes: 10
  combat:
    scenario: "deadly_corridor.wad"
    episodes: 10
  health:
    scenario: "health_gathering.wad"
    episodes: 1
  center:
    scenario: "defend_the_center.wad"
    episodes: 1
  defend:
    scenario: "defend_the_line.wad"
    episodes: 1
  prediction:
    scenario: "predict_position.wad"
    episodes: 1
  deathmatch:
    scenario: "deathmatch.wad"
    episodes: 1
  doom:
    scenario: "/Users/gmoore/Home/games/doom/wads/DOOM.WAD"
    episodes: 1
  doom2:
    scenario: "/Users/gmoore/Home/games/doom/wads/DOOM2.WAD"
    episodes: 1
  plutonia:
    scenario: "/Users/gmoore/Home/games/doom/wads/PLUTONIA.WAD"
    episodes: 1
  tnt:
    scenario: "/Users/gmoore/Home/games/doom/wads/TNT.WAD"
    episodes: 1

keybindings:
  basic:
    w: "+forward"
    s: "+back"
    a: "+moveleft"
    d: "+moveright"
    leftarrow: "+left"
    rightarrow: "+right"
    e: "+use"
    space: "+attack"
  classic: 
    w: "+forward"
    s: "+back"
    a: "+moveleft"
    d: "+moveright"
    leftarrow: "+left"
    rightarrow: "+right"
    e: "+use"
    space: "+attack"
    "1": '"slot 2"'
    "2": '"slot 3"'
  fluid:
    w: "+forward"
    s: "+back"
    a: "+moveleft"
    d: "+moveright"
    leftarrow: "+left"
    rightarrow: "+right"
    e: "+use"
    space: "+attack"
    q: "weapnext"