version: '3.8'

x-shared-env: &shared-env
  ARENA_MODULE: ${ARENA_MODULE:-cig_arena}
  ARENA_PLAYERS: 3

services:
  arena-host:
    image: chinchalinchin/golem-agent:latest
    container_name: vizdoom-host
    environment:
      <<: *shared-env
    ports:
      - "5029:5029/udp"
    command: ["sh", "-c", "python main.py host --module $$ARENA_MODULE --players $$ARENA_PLAYERS"]
    networks:
      - doom-net

  golem-fluid:
    image: chinchalinchin/golem-agent:latest
    container_name: golem-agent-1
    depends_on:
      - arena-host
    environment:
      <<: *shared-env
      HOST_IP: arena-host
      AGENT_NAME: Golem-Fluid
      AGENT_COLOR: 1
    volumes:
      - ./data:/app/data
    command: ["sh", "-c", "python main.py agent --module $$ARENA_MODULE"]
    networks:
      - doom-net

  intelact-legacy:
    image: intelact:local
    container_name: intelact-agent-1
    depends_on:
      - arena-host
    command: ["python", "run_agent.py", "arena-host"]
    networks:
      - doom-net

networks:
  doom-net:
    driver: bridge