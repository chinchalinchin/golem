app:
  name: "Golem"
  version: "0.2.3"
  log_level: "INFO"

config:
  basic: 'conf/basic.cfg'
  classic: 'conf/classic.cfg'
  fluid: 'conf/fluid.cfg'

training:
  batch_size: 16
  learning_rate: 0.0001
  epochs: 10
  sequence_length: 32
  augmentation:
    mirror: true

brain:
  # MODES: basic, classic, fluid
  mode: "basic"
  cortical_depth: 4
  working_memory: 128
  sensors:
    visual: true  # Base RGB Screen Buffer
    depth: true   # Stereopsis (Distance matrix)
    audio: false  # Audition (Raw stereo waveform)

data:
  prefix: "golem_"
  dirs:
    training: "data/training/"
    model: "data/model/"

modules:
  # --- Original ViZDoom Defaults ---
  basic:
    scenario: "basic.wad"
    episodes: 10
  navigation:
    scenario: "my_way_home.wad" 
    episodes: 10
  combat:
    scenario: "deadly_corridor.wad"
    episodes: 10
  health:
    scenario: "health_gathering.wad"
    episodes: 1
  center:
    scenario: "defend_the_center.wad"
    episodes: 1
  defend:
    scenario: "defend_the_line.wad"
    episodes: 1
  prediction:
    scenario: "predict_position.wad"
    episodes: 1
  deathmatch:
    scenario: "deathmatch.wad"
    episodes: 1
  cover:
    scenario: "take_cover.wad"
    episodes: 5
  supreme:
    scenario: "health_gathering_supreme.wad"
    episodes: 5

  # --- External / Community RL WADs ---
  cig_arena:
    scenario: "cig2017.wad" 
    episodes: 1
  freedoom:
    scenario: "freedoom2.wad"
    episodes: 1

  # --- Retail IWADs ---
  doom:
    scenario: "/Users/gmoore/Home/games/doom/wads/DOOM.WAD"
    episodes: 1
  doom2:
    scenario: "/Users/gmoore/Home/games/doom/wads/DOOM2.WAD"
    episodes: 1
  plutonia:
    scenario: "/Users/gmoore/Home/games/doom/wads/PLUTONIA.WAD"
    episodes: 1
  tnt:
    scenario: "/Users/gmoore/Home/games/doom/wads/TNT.WAD"
    episodes: 1

keybindings:
  basic:
    w: "+forward"
    s: "+back"
    a: "+moveleft"
    d: "+moveright"
    leftarrow: "+left"
    rightarrow: "+right"
    e: "+use"
    space: "+attack"
  classic: 
    w: "+forward"
    s: "+back"
    a: "+moveleft"
    d: "+moveright"
    leftarrow: "+left"
    rightarrow: "+right"
    e: "+use"
    space: "+attack"
    "1": '"slot 2"'
    "2": '"slot 3"'
  fluid:
    w: "+forward"
    s: "+back"
    a: "+moveleft"
    d: "+moveright"
    leftarrow: "+left"
    rightarrow: "+right"
    e: "+use"
    space: "+attack"
    q: "weapnext"