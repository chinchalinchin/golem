name: Golem CI/CD

on:
  push:
    branches:
      - master

# Grants the action permission to push the gh-pages branch
permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install system dependencies for ViZDoom
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential zlib1g-dev libsdl2-dev libjpeg-dev \
          nasm tar libbz2-dev libgtk2.0-dev cmake git libfluidsynth-dev libgme-dev \
          libopenal-dev timidity libwildmidi-dev unzip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          python -m unittest discover -s tests -v

  deploy-docs:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Ensures full git history is available if MkDocs plugins need it

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      # MkDocs and the Material theme are already in your requirements.txt
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Deploy MkDocs to GitHub Pages
        run: |
          # Configure git identity for the automated deployment commit
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          mkdocs gh-deploy --force