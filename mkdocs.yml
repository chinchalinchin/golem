site_name: Golem
site_url: https://chinchalinchin.github.io/golem/
repo_url: https://github.com/chinchalinchin/golem
repo_name: chinchalinchin/golem

# Theme: Material (Dark Mode by default to fit DOOM aesthetic)
theme:
  name: material
  palette: 
    scheme: slate
    primary: red
    accent: deep orange
  features:
    - content.code.copy
    - navigation.expand
    - navigation.indexes

# Explicit Navigation Order
nav:
  - Home: index.md
  - Environment: environment.md
  - The Brain: brain.md
  - Training: training.md
  - Roadmap: roadmap.md

# Extensions
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      # Mermaid Diagram Support
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  # LaTeX Math Support
  - pymdownx.arithmatex:
      generic: true

# MathJax Configuration for LaTeX rendering
extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js