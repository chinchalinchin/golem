name: Golem CI/CD

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    # Boot up your pre-compiled environment
    container:
      image: chinchalinchin/golem-ci:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # System dependencies and Python 3.10 are already in the container
      # We only need to install the Python requirements and run the tests
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

  deploy-docs:
    needs: test
    runs-on: ubuntu-latest
    container:
      image: chinchalinchin/golem-ci:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Deploy MkDocs to GitHub Pages
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          # Safe directory configuration is sometimes required when running git inside a Docker container in Actions
          git config --global --add safe.directory /__w/golem/golem
          mkdocs gh-deploy --force